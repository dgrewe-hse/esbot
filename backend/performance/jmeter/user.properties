# Default JMeter properties for ESBot API tests.
# Override at runtime: jmeter -Jthreads=100 -Jduration=600 ...

base.host=localhost
base.port=8000
base.protocol=http

# Load test (NFR: up to 50 concurrent users)
load.threads=50
load.ramp_up=60
load.duration=300

# Stress test (find breaking point — run only against dedicated environments)
stress.threads=200
stress.ramp_up=600
stress.duration=900

# Smoke test
smoke.threads=1
smoke.loops=5
