version: "3.9"

services:
  app:
    image: mcr.microsoft.com/devcontainers/java:1-17-bullseye
    container_name: esbot-backend-app
    working_dir: /workspace
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    environment:
      # Override datasource to use the db service hostname
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/esbot
      SPRING_DATASOURCE_USERNAME: esbot_user
      SPRING_DATASOURCE_PASSWORD: esbot_password
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: esbot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: esbot
      POSTGRES_USER: esbot_user
      POSTGRES_PASSWORD: esbot_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: