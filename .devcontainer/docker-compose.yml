version: "3.9"

services:
  app:
    # Python 3.12 DevContainer-Image mit vorinstalliertem uv
    image: mcr.microsoft.com/devcontainers/python:3.12
    container_name: esbot-backend-app
    working_dir: /workspace
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    # Umgebungsvariablen für die FastAPI-App
    # DATABASE_URL nutzt "db" als Hostname (Docker-Compose-Servicename)
    environment:
      DATABASE_URL: postgresql://esbot_user:esbot_password@db:5432/esbot
      APP_ENV: development
    ports:
      # FastAPI (uvicorn) läuft auf Port 8000
      - "8000:8000"
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: esbot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: esbot
      POSTGRES_USER: esbot_user
      POSTGRES_PASSWORD: esbot_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: