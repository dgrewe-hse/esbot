version: "3.9"

services:
  app:
    image: mcr.microsoft.com/devcontainers/base:ubuntu
    container_name: esbot-dev
    working_dir: /workspace
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    environment:
      DATABASE_URL: postgresql+psycopg://esbot_user:esbot_password@db:5432/esbot
      LLM_PROVIDER: mock
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      JMETER_HOME: /opt/apache-jmeter
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: esbot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: esbot
      POSTGRES_USER: esbot_user
      POSTGRES_PASSWORD: esbot_password
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
